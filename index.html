<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitish - Meow</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #111; /* Dark background for portfolio */
            color: white;
            overflow: hidden; /* Prevent scrolling while loading */
        }

        /* -----------------------------------
           LOADING SCREEN STYLES
           ----------------------------------- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Recreating the warm orange/peach gradient from the video */
            background: linear-gradient(135deg, #8B5A47, #E08455, #F5B994);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        /* The SVG Container */
        .signature-svg {
            width: 300px;
            height: 150px;
        }

        /* The Animated Text */
        .signature-text {
            /* Using a system cursive font for demonstration */
            font-family: 'Brush Script MT', 'Great Vibes', cursive;
            font-size: 4rem;
            font-weight: normal;
            
            /* The starting state: transparent fill, white outline */
            fill: transparent;
            stroke: #ffffff;
            stroke-width: 1.5px;
            
            /* The Magic Animation Properties */
            stroke-dasharray: 600;  /* Length of the stroke */
            stroke-dashoffset: 600; /* Pushes the stroke out of view */
            
            /* 1. Draw line for 2.5s, 2. Fill with white after line is drawn */
            animation: 
                drawSignature 2.5s ease-in-out forwards,
                fillSignature 1s 2.5s ease forwards;
        }

        /* Keyframes for drawing the outline */
        @keyframes drawSignature {
            to { stroke-dashoffset: 0; }
        }

        /* Keyframes for filling in the text */
        @keyframes fillSignature {
            to { fill: #ffffff; stroke: transparent; }
        }

        /* Class added via JS to hide the loader */
        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* -----------------------------------
           MOCK PORTFOLIO CONTENT
           ----------------------------------- */
        #content {
            padding: 50px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
        }

        /* Reveal content when loader is gone */
        body.loaded #content {
            opacity: 1;
            transform: translateY(0);
        }
        body.loaded {
            overflow: auto; /* Restore scrolling */
        }
    </style>
</head>
<body>

    <div id="loader">
        <svg viewBox="0 0 300 150" class="signature-svg">
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="signature-text">
                Nitish
            </text>
        </svg>
    </div>

    <div id="content">
        <h1>Hiiiiii:3</h1>
        <p>I am Nitish, meow for me.</p>
        </div>

    <script>
        // Wait for the animation to finish, then hide the loader
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            
            // 3500ms matches our CSS animation duration (2.5s draw + 1s fill)
            setTimeout(() => {
                loader.classList.add('fade-out');
                document.body.classList.add('loaded'); // Triggers content reveal
            }, 3500); 
        });
    </script>

</body>
</html>
